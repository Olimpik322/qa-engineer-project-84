- summary:
    Не отображается изображение английского флага при выборе языка локали 
  environment:  
    Google Chrome Версия 121.0.6167.161 (Официальная сборка), (64 бит)
    Windows 10 
  steps-to-reproduce:
    1. Открыть сайт https://hexlet-products-store.vercel.app/
    2. Нажать кнопку выбора языка
  expected result:
    При выборе языка, рядом будет отображаться соответствующий флаг
  actual result:
    Изображение флага не отображается(Screen 1)

